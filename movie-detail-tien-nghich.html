<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi Tiết Phim - Tiên Nghịch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-gradient-to-br from-gray-900 via-black to-gray-800 text-white min-h-screen">
    <nav class="backdrop-blur bg-gray-900/80 fixed w-full top-0 z-20 shadow-2xl border-b border-gray-700">
      <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-orange-500">
          JangHH3D
        </a>
      </div>
    </nav>

    <section class="container mx-auto pt-24 px-4">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="col-span-1">
          <img
            src="https://hoathinh3d.site/wp-content/uploads/2023/09/tien-nghich-3-300x450.jpg"
            alt="Tiên Nghịch"
            class="rounded-lg shadow-lg"
          />
        </div>
        <div class="col-span-2">
          <h1 class="text-4xl font-extrabold mb-4">Tiên Nghịch</h1>
          <p class="text-gray-400 mb-4">
            <span class="font-bold text-yellow-400">Thể loại:</span> Hành động, Phiêu lưu, Giả tưởng
          </p>
          <p class="text-gray-400 mb-4">
            <span class="font-bold text-yellow-400">Số tập:</span> 24
          </p>
          <p class="text-gray-400 mb-4">
            <span class="font-bold text-yellow-400">Năm phát hành:</span> 2023
          </p>
          <p class="text-gray-400 mb-4">
            <span class="font-bold text-yellow-400">Nội dung:</span> Một thiếu niên bình thường vô tình bước vào con đường tu tiên, đối mặt với những thử thách và âm mưu để trở thành một cường giả.
          </p>
          <button class="bg-yellow-400 text-black px-6 py-2 rounded-lg font-bold hover:bg-yellow-500 transition">
            Xem Ngay
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
