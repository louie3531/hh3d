<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - HoatHinh3D</title>
    <link rel="icon" href="images/favicon.ico" sizes="any" />
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="images/favicon.svg" />
    <meta name="theme-color" content="#E50914" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      :root {
        --primary-color: #e50914;
        --secondary-color: #b81d24;
        --dark-color: #221f1f;
        --light-color: #f5f5f1;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #141414;
        color: var(--light-color);
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 450px;
        padding: 2rem;
      }

      .logo {
        text-align: center;
        margin-bottom: 2rem;
      }

      .logo h1 {
        color: var(--primary-color);
        font-size: 2.5rem;
        font-weight: bold;
      }

      .register-form {
        background-color: rgba(0, 0, 0, 0.75);
        padding: 2rem;
        border-radius: 4px;
      }

      .form-title {
        margin-bottom: 1.5rem;
        font-size: 1.8rem;
        font-weight: 500;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 1rem;
      }

      .form-control {
        width: 100%;
        padding: 1rem;
        border: none;
        border-radius: 4px;
        background-color: #333;
        color: white;
        font-size: 1rem;
      }

      .form-control:focus {
        outline: none;
        background-color: #454545;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 1rem;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .btn:hover {
        background-color: var(--secondary-color);
      }

      .alert {
        padding: 0.75rem 1.25rem;
        margin-bottom: 1rem;
        border-radius: 4px;
        display: none;
      }

      .alert-danger {
        background-color: rgba(220, 53, 69, 0.2);
        color: #dc3545;
        border: 1px solid #dc3545;
      }

      .alert-success {
        background-color: rgba(40, 167, 69, 0.2);
        color: #28a745;
        border: 1px solid #28a745;
      }

      .links {
        margin-top: 1.5rem;
        text-align: center;
        display: flex;
        justify-content: space-between;
      }

      .links a {
        color: var(--light-color);
        text-decoration: none;
        font-size: 0.9rem;
      }

      .links a:hover {
        text-decoration: underline;
      }

      .password-toggle {
        position: relative;
      }

      .password-toggle i {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #aaa;
      }

      .password-requirements {
        font-size: 0.8rem;
        color: #aaa;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h1>MovieStream</h1>
      </div>

      <div class="register-form">
        <h2 class="form-title">Đăng ký tài khoản</h2>

        <div id="register-error" class="alert alert-danger">
          <i class="fas fa-exclamation-circle"></i>
          <span id="error-message">Đã xảy ra lỗi. Vui lòng thử lại.</span>
        </div>

        <div id="register-success" class="alert alert-success">
          <i class="fas fa-check-circle"></i>
          <span id="success-message"
            >Đăng ký thành công! Đang chuyển hướng...</span
          >
        </div>

        <form id="register-form">
          <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input
              type="text"
              id="username"
              class="form-control"
              placeholder="Nhập tên đăng nhập"
              required
            />
          </div>

          <div class="form-group">
            <label for="display-name">Tên hiển thị</label>
            <input
              type="text"
              id="display-name"
              class="form-control"
              placeholder="Nhập tên hiển thị"
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Nhập email"
            />
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="password-toggle">
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Nhập mật khẩu"
                required
              />
              <i class="fas fa-eye" id="toggle-password"></i>
            </div>
            <div class="password-requirements">
              Mật khẩu cần có ít nhất 6 ký tự
            </div>
          </div>

          <div class="form-group">
            <label for="confirm-password">Xác nhận mật khẩu</label>
            <div class="password-toggle">
              <input
                type="password"
                id="confirm-password"
                class="form-control"
                placeholder="Nhập lại mật khẩu"
                required
              />
              <i class="fas fa-eye" id="toggle-confirm-password"></i>
            </div>
          </div>

          <button type="submit" class="btn">Đăng ký</button>
        </form>

        <div class="links">
          <a href="index.html"
            ><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a
          >
          <a href="login.html">Đã có tài khoản? Đăng nhập</a>
        </div>
      </div>
    </div>

    <script src="js/movies-data.js"></script>
    <script src="js/video-data.js"></script>
    <script src="js/users.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Kiểm tra nếu đã đăng nhập thì chuyển hướng đến trang chủ
        if (checkLoginSession()) {
          window.location.href = "index.html";
        }

        const registerForm = document.getElementById("register-form");
        const registerError = document.getElementById("register-error");
        const registerSuccess = document.getElementById("register-success");
        const errorMessage = document.getElementById("error-message");
        const togglePassword = document.getElementById("toggle-password");
        const toggleConfirmPassword = document.getElementById(
          "toggle-confirm-password"
        );
        const passwordInput = document.getElementById("password");
        const confirmPasswordInput =
          document.getElementById("confirm-password");

        // Xử lý hiển thị/ẩn mật khẩu
        togglePassword.addEventListener("click", function () {
          if (passwordInput.type === "password") {
            passwordInput.type = "text";
            togglePassword.classList.remove("fa-eye");
            togglePassword.classList.add("fa-eye-slash");
          } else {
            passwordInput.type = "password";
            togglePassword.classList.remove("fa-eye-slash");
            togglePassword.classList.add("fa-eye");
          }
        });

        toggleConfirmPassword.addEventListener("click", function () {
          if (confirmPasswordInput.type === "password") {
            confirmPasswordInput.type = "text";
            toggleConfirmPassword.classList.remove("fa-eye");
            toggleConfirmPassword.classList.add("fa-eye-slash");
          } else {
            confirmPasswordInput.type = "password";
            toggleConfirmPassword.classList.remove("fa-eye-slash");
            toggleConfirmPassword.classList.add("fa-eye");
          }
        });

        // Xử lý đăng ký
        registerForm.addEventListener("submit", function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const displayName = document
            .getElementById("display-name")
            .value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirm-password").value;

          // Kiểm tra tên đăng nhập
          if (username.length < 3) {
            showError("Tên đăng nhập phải có ít nhất 3 ký tự");
            return;
          }

          // Kiểm tra mật khẩu
          if (password.length < 6) {
            showError("Mật khẩu phải có ít nhất 6 ký tự");
            return;
          }

          // Kiểm tra xác nhận mật khẩu
          if (password !== confirmPassword) {
            showError("Mật khẩu xác nhận không khớp");
            return;
          }

          // Tạo đối tượng người dùng mới
          const newUser = {
            username: username,
            password: password,
            displayName: displayName || username,
            email: email || "",
            role: "user",
            createdAt: new Date().toISOString(),
          };

          // Thêm người dùng mới
          if (addUser(newUser)) {
            // Đăng ký thành công
            registerSuccess.style.display = "block";

            // Tự động đăng nhập sau khi đăng ký
            setTimeout(function () {
              loginUser(username, password);
              window.location.href = "index.html";
            }, 2000);
          } else {
            // Đăng ký thất bại
            showError(
              "Tên đăng nhập đã tồn tại. Vui lòng chọn tên đăng nhập khác."
            );
          }
        });

        // Hiển thị thông báo lỗi
        function showError(message) {
          errorMessage.textContent = message;
          registerError.style.display = "block";

          setTimeout(function () {
            registerError.style.display = "none";
          }, 3000);
        }
      });
    </script>
  </body>
</html>
